<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/configuration-relais.css') }}">
    <title>Configuration de la Temporalité</title>
</head>

<body>
    <div class="screen-container configuration-relais-screen">
        <!-- Header -->
        <div class="header">
            <!-- Back Button -->
            <button class="back-btn" onclick="goBack()">
                <img src="{{ url_for('static', filename='img/common/back.png') }}" alt="Retour">
            </button>

            <!-- Title Image -->
            <div class="title-container">
                <img src="{{ url_for('static', filename='img/configuration-timings/title.png') }}"
                    alt="Configuration de la Temporalité" class="title-img">
            </div>
        </div>

        <!-- Cards Container -->
        <div class="relais-container">
            <!-- Durée du jeu Card -->
            <div class="relais-card" data-card="duree">
                <div class="card-content" onclick="toggleCard(this.parentElement)">
                    <img src="{{ url_for('static', filename='img/configuration-relais/hourglass.png') }}"
                        alt="Durée du jeu" class="card-icon">
                    <h3 class="card-label">Durée du jeu</h3>
                </div>
                <div class="card-expanded duree-expanded" style="display: none;" onclick="event.stopPropagation()">
                    <!-- Row 1: Temps du jeu + Nombre de passages -->
                    <div class="inputs-row">
                        <div class="input-field" onclick="showKeypad('gameTime', 'Temps du jeu'); event.stopPropagation();">
                            <label>Temps du jeu :</label>
                            <input type="text" class="timing-input" id="gameTime" readonly value="32">
                            <span class="unit">min</span>
                        </div>
                        <div class="input-field" onclick="showKeypad('passagesCount', 'Nombre de passages'); event.stopPropagation();">
                            <label>Nombre de passages :</label>
                            <input type="text" class="timing-input" id="passagesCount" readonly value="8">
                        </div>
                    </div>
                    <!-- Row 2: Nombre de réponses (full width) -->
                    <div class="input-field full-width" onclick="showKeypad('reponsesCount', 'Nombre de réponses'); event.stopPropagation();">
                        <label>Nombre de réponses :</label>
                        <input type="text" class="timing-input" id="reponsesCount" readonly value="5">
                    </div>
                </div>
            </div>

            <!-- Pénalité sportive Card -->
            <div class="relais-card" data-card="penalite">
                <div class="card-content" onclick="toggleCard(this.parentElement)">
                    <img src="{{ url_for('static', filename='img/configuration-relais/redcard.png') }}"
                        alt="Pénalité sportive" class="card-icon">
                    <h3 class="card-label">Pénalité sportive</h3>
                </div>
                <div class="card-expanded penalties-expanded" style="display: none;" onclick="event.stopPropagation()">
                    <!-- Penalty Options -->
                    <div class="penalties-container">
                        <div class="penalty-option" data-penalty="gainage" onclick="togglePenalty(this)">
                            <img src="{{ url_for('static', filename='img/configuration-relais/gainage.png') }}"
                                alt="Position de gainage" class="penalty-img">
                        </div>
                        <div class="penalty-option" data-penalty="squat" onclick="togglePenalty(this)">
                            <img src="{{ url_for('static', filename='img/configuration-relais/squat.png') }}"
                                alt="Squat" class="penalty-img">
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Valider Button -->
        <button class="valider-btn" id="relaisValiderBtn" onclick="handleRelaisValider()" style="display: none;">
            <img src="{{ url_for('static', filename='img/common/valider.png') }}" alt="Valider">
        </button>
    </div>

    <script>
        function goBack() {
            window.history.back();
        }

        function toggleCard(element) {
            const expanded = element.querySelector('.card-expanded');
            const cardContent = element.querySelector('.card-content');

            if (expanded.style.display === 'none') {
                expanded.style.display = 'flex';
                cardContent.classList.add('compressed');
                expanded.classList.remove('hidden');
            } else {
                expanded.classList.add('hidden');
                setTimeout(() => {
                    expanded.style.display = 'none';
                    cardContent.classList.remove('compressed');
                    expanded.classList.remove('hidden');
                }, 300);
            }
        }

        function togglePenalty(element) {
            element.classList.toggle('selected');
            checkValiderButton();
        }

        function checkValiderButton() {
            const gameTime = document.getElementById('gameTime').value;
            const passagesCount = document.getElementById('passagesCount').value;
            const reponsesCount = document.getElementById('reponsesCount').value;
            const penaltySelected = document.querySelector('.penalty-option.selected');
            const validerBtn = document.getElementById('relaisValiderBtn');

            // Check if all required fields are filled
            if (gameTime && passagesCount && reponsesCount && penaltySelected) {
                validerBtn.style.display = 'flex';
            } else {
                validerBtn.style.display = 'none';
            }
        }

        function handleRelaisValider() {
            const gameTime = parseInt(document.getElementById('gameTime').value);
            const passagesCount = parseInt(document.getElementById('passagesCount').value);
            const reponsesCount = parseInt(document.getElementById('reponsesCount').value);

            // Get selected penalties
            const selectedPenalties = [];
            document.querySelectorAll('.penalty-option.selected').forEach(option => {
                selectedPenalties.push(option.dataset.penalty);
            });

            const relaisData = {
                gameTime: gameTime,
                passagesCount: passagesCount,
                reponsesCount: reponsesCount,
                penalties: selectedPenalties,
                penaltyDuration: 20
            };

            console.log('Relais data:', relaisData);

            // Save to game_setup.json
            fetch('/save-game-setup', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(relaisData)
            }).then(response => response.json())
                .then(data => {
                    console.log('Relais config saved:', data);
                    window.location.href = '/recapitulatif';
                })
                .catch(error => {
                    console.error('Error saving relais config:', error);
                });
        }

        // Keypad functions
        let currentKeypadInput = null;

        function showKeypad(inputId, title) {
            currentKeypadInput = document.getElementById(inputId);
            const keypad = document.getElementById('keypadOverlay');
            const display = document.getElementById('keypadDisplay');
            const keypadTitle = document.getElementById('keypadTitle');

            keypadTitle.textContent = title;
            display.value = currentKeypadInput.value || '';
            keypad.style.display = 'flex';
        }

        function hideKeypad() {
            document.getElementById('keypadOverlay').style.display = 'none';
            currentKeypadInput = null;
        }

        function keypadPress(num) {
            const display = document.getElementById('keypadDisplay');
            const currentValue = display.value;

            // Limit to 2 digits
            if (currentValue.length < 2) {
                display.value = currentValue + num;
            }
        }

        function keypadBackspace() {
            const display = document.getElementById('keypadDisplay');
            display.value = display.value.slice(0, -1);
        }

        function keypadClear() {
            document.getElementById('keypadDisplay').value = '';
        }

        function keypadOk() {
            const display = document.getElementById('keypadDisplay');
            const value = display.value;

            if (currentKeypadInput && value !== '') {
                currentKeypadInput.value = value;
                checkValiderButton();
            }

            hideKeypad();
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', function () {
            checkValiderButton();
        });
    </script>

    <!-- Keypad Overlay -->
    <div id="keypadOverlay" class="keypad-overlay" style="display: none;">
        <div class="keypad-container">
            <div class="keypad-header">
                <h3 id="keypadTitle">Entrez un nombre</h3>
                <button class="keypad-close" onclick="hideKeypad()">✕</button>
            </div>
            <div class="keypad-display">
                <input type="text" id="keypadDisplay" readonly>
            </div>
            <div class="keypad-buttons">
                <button class="keypad-btn" onclick="keypadPress('1')">1</button>
                <button class="keypad-btn" onclick="keypadPress('2')">2</button>
                <button class="keypad-btn" onclick="keypadPress('3')">3</button>
                <button class="keypad-btn" onclick="keypadPress('4')">4</button>
                <button class="keypad-btn" onclick="keypadPress('5')">5</button>
                <button class="keypad-btn" onclick="keypadPress('6')">6</button>
                <button class="keypad-btn" onclick="keypadPress('7')">7</button>
                <button class="keypad-btn" onclick="keypadPress('8')">8</button>
                <button class="keypad-btn" onclick="keypadPress('9')">9</button>
                <button class="keypad-btn keypad-clear" onclick="keypadClear()">C</button>
                <button class="keypad-btn" onclick="keypadPress('0')">0</button>
                <button class="keypad-btn keypad-backspace" onclick="keypadBackspace()">⌫</button>
            </div>
            <button class="keypad-ok" onclick="keypadOk()">OK</button>
        </div>
    </div>
</body>

</html>
