<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/joker-selection.css') }}">
    <title>Choix des Jokers</title>
</head>

<body>
    <div class="screen-container joker-selection-screen">
        <!-- Header -->
        <div class="header">
            <!-- Back Button -->
            <button class="back-btn" onclick="goBack()">
                <img src="{{ url_for('static', filename='img/common/back.png') }}" alt="Retour">
            </button>

            <!-- Title Image -->
            <div class="title-container">
                <img src="{{ url_for('static', filename='img/choix-joker/title.png') }}" alt="Choix des Jokers"
                    class="title-img">
            </div>
        </div>

        <!-- Intro Section -->
        <div class="intro-section">
            <img src="{{ url_for('static', filename='img/choix-joker/intro.png') }}"
                alt="Veuillez sélectionner un joker" class="intro-img">
        </div>

        <!-- Jokers Grid -->
        <div class="jokers-grid">
            <!-- Theme Joker -->
            <div class="joker-card" data-joker="theme" onclick="selectJoker(this)">
                <img src="{{ url_for('static', filename='img/choix-joker/theme-joker.png') }}" alt="Theme Joker"
                    class="joker-img">
                <div class="joker-select-btn" style="display: none;"></div>
            </div>

            <!-- Team Joker -->
            <div class="joker-card" data-joker="team" onclick="selectJoker(this)">
                <img src="{{ url_for('static', filename='img/choix-joker/team-joker.png') }}" alt="Team Joker"
                    class="joker-img">
                <div class="joker-select-btn" style="display: none;"></div>
            </div>

            <!-- Double Point Joker (mode sport-collectif) / Double Passage Joker (mode relais-biathlon) -->
            {% if mode == 'relais-biathlon' %}
            <div class="joker-card" data-joker="double-passage" onclick="selectJoker(this)">
                <img src="{{ url_for('static', filename='img/choix-joker/double-passage-joker.png') }}"
                    alt="Passage en plus Joker" class="joker-img">
                <div class="joker-select-btn" style="display: none;"></div>
            </div>
            {% else %}
            <div class="joker-card" data-joker="double-point" onclick="selectJoker(this)">
                <img src="{{ url_for('static', filename='img/choix-joker/double-point-joker.png') }}"
                    alt="Double Point Joker" class="joker-img">
                <div class="joker-select-btn" style="display: none;"></div>
            </div>
            {% endif %}

            <!-- Double Prison Joker (sport-collectif) / Double Pénalité Joker (relais-biathlon) -->
            {% if mode == 'relais-biathlon' %}
            <div class="joker-card" data-joker="double-penalite" onclick="selectJoker(this)">
                <img src="{{ url_for('static', filename='img/choix-joker/double-penalite.png') }}"
                    alt="Double Pénalité Joker" class="joker-img">
                <div class="joker-select-btn" style="display: none;"></div>
            </div>
            {% else %}
            <div class="joker-card" data-joker="double-prison" onclick="selectJoker(this)">
                <img src="{{ url_for('static', filename='img/choix-joker/double-prison-joker.png') }}"
                    alt="Double Prison Joker" class="joker-img">
                <div class="joker-select-btn" style="display: none;"></div>
            </div>
            {% endif %}

            <!-- Switch Joker -->
            <div class="joker-card" data-joker="switch" onclick="selectJoker(this)">
                <img src="{{ url_for('static', filename='img/choix-joker/switch-joker.png') }}" alt="Switch Joker"
                    class="joker-img">
                <div class="joker-select-btn" style="display: none;"></div>
            </div>

            <!-- Indice Joker -->
            <div class="joker-card" data-joker="indice" onclick="selectJoker(this)">
                <img src="{{ url_for('static', filename='img/choix-joker/indice-joker.png') }}" alt="Indice Joker"
                    class="joker-img">
                <div class="joker-select-btn" style="display: none;"></div>
            </div>

            <!-- Game Master Joker -->
            <div class="joker-card game-master-toggle" onclick="toggleAllJokers()">
                <img src="{{ url_for('static', filename='img/choix-joker/game-master-joker.png') }}"
                    alt="Game Master Joker" class="joker-img">
                <div class="joker-select-btn" style="display: none;"></div>
            </div>
        </div>

        <!-- Valider Button -->
        <button class="valider-btn" id="validerBtn" style="display: none;">
            <img src="{{ url_for('static', filename='img/common/valider.png') }}" alt="Valider">
        </button>
    </div>

    <script>
        let selectedJokers = [];
        const gameMode = '{{ mode | default("sport-collectif") }}';
        const regularJokers = gameMode === 'relais-biathlon'
            ? ['theme', 'team', 'double-passage', 'double-penalite', 'switch', 'indice']
            : ['theme', 'team', 'double-point', 'double-prison', 'switch', 'indice'];

        function goBack() {
            window.history.back();
        }

        function selectJoker(element) {
            const jokerValue = element.dataset.joker;

            // Toggle selected class on clicked card
            element.classList.toggle('selected');

            // Update selectedJokers array
            if (element.classList.contains('selected')) {
                // Add joker to array if not already present
                if (!selectedJokers.includes(jokerValue)) {
                    selectedJokers.push(jokerValue);
                }
                element.querySelector('.joker-select-btn').style.display = 'flex';
            } else {
                // Remove joker from array
                selectedJokers = selectedJokers.filter(j => j !== jokerValue);
                element.querySelector('.joker-select-btn').style.display = 'none';
            }

            updateValiderButton();
            console.log('Selected jokers:', selectedJokers);
        }

        function toggleAllJokers() {
            const gameMasterCard = document.querySelector('.game-master-toggle');
            const allJokerCards = document.querySelectorAll('.joker-card[data-joker]');

            // Check if all jokers are currently selected
            const allSelected = regularJokers.every(joker => selectedJokers.includes(joker));

            if (allSelected) {
                // Deselect all
                selectedJokers = [];
                allJokerCards.forEach(card => {
                    card.classList.remove('selected');
                    card.querySelector('.joker-select-btn').style.display = 'none';
                });
                gameMasterCard.classList.remove('selected');
                gameMasterCard.querySelector('.joker-select-btn').style.display = 'none';
            } else {
                // Select all
                selectedJokers = [...regularJokers];
                allJokerCards.forEach(card => {
                    card.classList.add('selected');
                    card.querySelector('.joker-select-btn').style.display = 'flex';
                });
                gameMasterCard.classList.add('selected');
                gameMasterCard.querySelector('.joker-select-btn').style.display = 'flex';
            }

            updateValiderButton();
            console.log('Selected jokers:', selectedJokers);
        }

        function updateValiderButton() {
            // Show/hide valider button based on selection
            if (selectedJokers.length > 0) {
                document.getElementById('validerBtn').style.display = 'flex';
                document.getElementById('validerBtn').classList.add('show-animation');
            } else {
                document.getElementById('validerBtn').classList.add('hide-animation');
                setTimeout(() => {
                    document.getElementById('validerBtn').style.display = 'none';
                    document.getElementById('validerBtn').classList.remove('hide-animation');
                }, 300);
            }
        }

        function handleValider() {
            if (selectedJokers.length > 0) {
                console.log('Validating jokers:', selectedJokers);

                // Save the selected jokers to game_setup.json
                fetch('/save-game-setup', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ jokers: selectedJokers })
                }).then(response => response.json())
                    .then(data => {
                        console.log('Jokers saved:', data);
                        window.location.href = '/level-selection';
                    })
                    .catch(error => {
                        console.error('Error saving jokers:', error);
                        window.location.href = '/level-selection';
                    });
            }
        }

        // Add click handler to valider button
        document.addEventListener('DOMContentLoaded', function () {
            const validerBtn = document.getElementById('validerBtn');
            if (validerBtn) {
                validerBtn.addEventListener('click', handleValider);
            }
        });
    </script>
</body>

</html>
