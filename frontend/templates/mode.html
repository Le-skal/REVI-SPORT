<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/mode.css') }}">
    <title>Choix du mode</title>
</head>

<body>
    <div class="screen-container mode-screen">
        <img class="mode-title" src="{{ url_for('static', filename='img/mode/title.png') }}" alt="Choix du mode">

        <img class="mode-intro" src="{{ url_for('static', filename='img/mode/intro.png') }}"
            alt="Veuillez sélectionner un mode">

        <div class="mode-container">
            <div class="mode-card-link" onclick="selectMode('sport-collectif')">
                <img class="mode-card" src="{{ url_for('static', filename='img/mode/mode1.png') }}"
                    alt="Mode 1 - Sport collectif">
            </div>
            <div class="mode-card-link" onclick="selectMode('relais-biathlon')">
                <img class="mode-card" src="{{ url_for('static', filename='img/mode/mode2.png') }}"
                    alt="Mode 2 - Relais, biathlon">
            </div>
        </div>
    </div>

    <script>
        function selectMode(mode) {
            // Save mode to game_setup.json
            fetch('/save-game-setup', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ mode: mode })
            }).then(response => response.json())
                .then(data => {
                    console.log('Mode saved:', data);
                    // Redirect based on mode
                    if (mode === 'sport-collectif') {
                        window.location.href = '/sport';
                    } else if (mode === 'relais-biathlon') {
                        window.location.href = '/parcours';
                    }
                })
                .catch(error => {
                    console.error('Error saving mode:', error);
                });
        }
    </script>
</body>

</html>
