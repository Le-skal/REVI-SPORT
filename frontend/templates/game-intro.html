<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/game-intro.css') }}">
    <title>Game Intro</title>
</head>

<body>
    <div class="screen-container game-intro-screen">
        <div class="intro-container">
            <div class="circle-bg" id="circleBg"></div>
            {% if is_bonus %}
            <img class="intro-image" id="introImage" src="{{ url_for('static', filename='img/start-count/intro3.png') }}"
                alt="Intro">
            {% elif mode == 'relais-biathlon' %}
            <img class="intro-image" id="introImage" src="{{ url_for('static', filename='img/start-count/intro2.png') }}"
                alt="Intro">
            {% else %}
            <img class="intro-image" id="introImage" src="{{ url_for('static', filename='img/start-count/intro.png') }}"
                alt="Intro">
            {% endif %}
        </div>
    </div>

    <script>
        const introImage = document.getElementById('introImage');
        const circleBg = document.getElementById('circleBg');

        // Start animation immediately
        introImage.style.animation = 'growImage 3s ease-out forwards';
        circleBg.style.animation = 'growCircle 3s ease-out forwards';

        // After animation completes (3s) + 500ms buffer, get random question and route
        setTimeout(() => {
            // Fetch random question based on game setup
            fetch('/get-random-question')
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        const gameType = data.gameType;
                        const questionId = data.question.id;

                        // Route to appropriate game page based on gameType
                        const gameTypeToRoute = {
                            'knowledge': '/game-knowledge',
                            'link': '/game-link',
                            'order': '/game-orderPhrase',
                            'text-input': '/game-math'
                        };

                        const route = gameTypeToRoute[gameType] || '/game-knowledge';
                        window.location.href = `${route}?questionId=${questionId}`;
                    } else {
                        console.error('Error loading question:', data.error);
                        // Fallback to knowledge game
                        window.location.href = '/game-knowledge';
                    }
                })
                .catch(error => {
                    console.error('Error fetching question:', error);
                    // Fallback to knowledge game
                    window.location.href = '/game-knowledge';
                });
        }, 3500);
    </script>
</body>

</html>
