<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/sport.css') }}">
    <title>Choix du sport</title>
</head>

<body>
    <div class="screen-container sport-screen">
        <img class="sport-title" src="{{ url_for('static', filename='img/sport/title.png') }}" alt="Choix du sport">

        <img class="sport-intro" src="{{ url_for('static', filename='img/sport/intro.png') }}"
            alt="Veuillez sélectionner un sport">

        <div class="sports-grid">
            <div class="sport-card" onclick="selectSport('football')">
                <img src="{{ url_for('static', filename='img/sport/sport_football.png') }}" alt="Football">
            </div>
            <div class="sport-card" onclick="selectSport('handball')">
                <img src="{{ url_for('static', filename='img/sport/sport_handball.png') }}" alt="Handball">
            </div>
            <div class="sport-card" onclick="selectSport('rugby')">
                <img src="{{ url_for('static', filename='img/sport/sport_rugby.png') }}" alt="Rugby">
            </div>
            <div class="sport-card" onclick="selectSport('basketball')">
                <img src="{{ url_for('static', filename='img/sport/sport_basketball.png') }}" alt="Basketball">
            </div>
            <div class="sport-card" onclick="selectSport('ultimate')">
                <img src="{{ url_for('static', filename='img/sport/sport_ultimate.png') }}" alt="Ultimate">
            </div>
            <div class="sport-card" onclick="selectSport('autre')">
                <img src="{{ url_for('static', filename='img/sport/sport_autre.png') }}" alt="Autre sport">
            </div>
        </div>
    </div>

    <script>
        function selectSport(sport) {
            // Save sport to game_setup.json
            fetch('/save-game-setup', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ sport: sport })
            }).then(response => response.json())
                .then(data => {
                    console.log('Sport saved:', data);
                    // Redirect based on sport (for now, basketball goes to /basketball, others can be implemented later)
                    if (sport === 'basketball') {
                        window.location.href = '/basketball';
                    } else {
                        // For other sports, redirect to a general page or show message
                        window.location.href = '/basketball'; // temporary, change as needed
                    }
                })
                .catch(error => {
                    console.error('Error saving sport:', error);
                });
        }
    </script>
</body>

</html>
